name: Deploy Telegram Agent Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: telegram-agent-bot-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}" || (echo "DEPLOY_HOST secret is missing" && exit 1)
          test -n "${{ secrets.DEPLOY_USER }}" || (echo "DEPLOY_USER secret is missing" && exit 1)
          test -n "${{ secrets.DEPLOY_PATH }}" || (echo "DEPLOY_PATH secret is missing" && exit 1)
          test -n "${{ secrets.DEPLOY_SSH_KEY }}" || (echo "DEPLOY_SSH_KEY secret is missing" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".venv" \
            --exclude ".data" \
            --exclude "data" \
            --exclude "work" \
            --exclude "outputs" \
            --exclude "__pycache__" \
            --exclude "*.pyc" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Start service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -e
            cd '${{ secrets.DEPLOY_PATH }}'
            docker compose up -d --build
            docker compose ps
            nginx -t
            systemctl reload nginx
          "
